<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مليون استغفار - الإدارة والسجلات</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Scheherazade+New:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────────────────────────────────────
   DESIGN SYSTEM
   ───────────────────────────────────────────────────────────────────────────── */
:root {
    --primary: #c9943a;
    --primary-light: #f5dfa0;
    --primary-dark: #6e4c1a;
    --bg: #06060c;
    --card-bg: #0e0e1a;
    --text: #f0e8d0;
    --text-muted: #a09070;
    --text-dim: #605040;
    --accent: #2d9e5f;
    --danger: #c43a3a;
    --diamond: #4bc0c8;
    --fire: #ff6b35;
    --glow: rgba(201, 148, 58, 0.4);
    --radius: 28px;
    --glass: rgba(14, 14, 26, 0.94);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
}

body::before {
    content: ''; position: fixed; inset: 0;
    background: 
        radial-gradient(ellipse at 50% -10%, rgba(201,148,58,0.2) 0%, transparent 70%),
        radial-gradient(circle at 100% 100%, rgba(75,192,200,0.08) 0%, transparent 40%);
    z-index: -1; pointer-events: none;
}

.container { width: 100%; max-width: 500px; margin: 0 auto; }

/* ─────────────────────────────────────────────────────────────────────────────
   SCREENS
   ───────────────────────────────────────────────────────────────────────────── */
.screen { display: none; flex-direction: column; padding: 24px 16px 140px; min-height: 100vh; animation: screenIn 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
.screen.active { display: flex; }
@keyframes screenIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

/* ─────────────────────────────────────────────────────────────────────────────
   COMPONENTS
   ───────────────────────────────────────────────────────────────────────────── */
.card-master {
    background: linear-gradient(165deg, var(--card-bg), #1a1a35);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
}

.hero-card-v3 {
    background: linear-gradient(135deg, #12122b, #0e0e1a);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 24px;
    box-shadow: 0 15px 45px rgba(0,0,0,0.8);
    position: relative;
}

.hero-svg-box { width: 100px; height: 100px; position: relative; flex-shrink: 0; }
.hero-svg { position: absolute; inset: 0; transform: rotate(-90deg); filter: drop-shadow(0 0 5px var(--glow)); }
.hero-track { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 8; }
.hero-progress { fill: none; stroke: var(--primary); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 238; stroke-dashoffset: 238; transition: stroke-dashoffset 1s ease-out; }
.hero-pct-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; font-weight: 800; color: var(--primary-light); }

.hero-stat-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 5px; }
.hero-stat-lbl { font-size: 0.75rem; color: var(--text-muted); }
.hero-stat-val { font-family: 'Scheherazade New', serif; font-size: 1.6rem; color: var(--primary); line-height: 1; }

.logo-main {
    font-family: 'Scheherazade New', serif; font-size: 3rem; font-weight: 700;
    background: linear-gradient(135deg, var(--primary-light), var(--primary), var(--primary-dark));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.btn-royal { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #000; border: none; border-radius: 20px; padding: 18px; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 30px rgba(201, 148, 58, 0.3); }

/* ─────────────────────────────────────────────────────────────────────────────
   LOGS (HISTORY) - USER EXPERIENCE
   ───────────────────────────────────────────────────────────────────────────── */
.log-row { 
    background: rgba(255,255,255,0.02); 
    border-radius: 18px; 
    padding: 14px 18px; 
    margin-bottom: 8px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    border-right: 4px solid var(--primary);
}
.log-row.manual { border-right-color: var(--accent); }
.log-info { display: flex; flex-direction: column; gap: 2px; }
.log-type { font-size: 0.8rem; font-weight: 700; color: var(--primary); }
.log-date { font-size: 0.65rem; color: var(--text-dim); }
.log-amt { font-family: 'Scheherazade New', serif; font-size: 1.4rem; color: var(--text); }

/* ─────────────────────────────────────────────────────────────────────────────
   BEAD CONTROL (AUTO RESET)
   ───────────────────────────────────────────────────────────────────────────── */
.bead-ring { width: 280px; height: 280px; margin: 20px auto; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
.bead-svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.bead-track { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 10; }
.bead-progress { fill: none; stroke: var(--primary); stroke-width: 10; stroke-linecap: round; stroke-dasharray: 754; stroke-dashoffset: 754; transition: 0.2s linear; }
.bead-core {
    width: 200px; height: 200px; border-radius: 50%; border: none; cursor: pointer;
    background: radial-gradient(circle at 35% 35%, #ffd06b 0%, var(--primary) 45%, #2a1b00 100%);
    box-shadow: 0 15px 60px rgba(0,0,0,0.8), inset 0 -10px 20px rgba(0,0,0,0.5);
    display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.05s; z-index: 5;
}
.bead-core:active { transform: scale(0.92); }
.bead-lbl { font-family: 'Scheherazade New', serif; font-size: 2.4rem; font-weight: 700; color: #fff; text-shadow: 0 4px 8px rgba(0,0,0,0.5); }
.bead-pct-label { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); font-size: 0.85rem; font-weight: 800; color: #fff; opacity: 0.8; }

.goal-picker { margin: 20px 0; display:flex; justify-content:center; gap:8px; flex-wrap: wrap; }
.goal-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-muted);
    padding: 10px 20px;
    border-radius: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    font-family: inherit;
}
.goal-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
.goal-btn.active {
    background: var(--primary);
    color: #000;
    border-color: var(--primary);
    box-shadow: 0 8px 20px var(--glow);
    transform: scale(1.05);
}

.ranking-row { background: rgba(255,255,255,0.03); border-radius: 22px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.04); }
.ranking-row.me { border-color: var(--primary); background: rgba(201,148,58,0.1); }
.rank-badge { width: 44px; height: 44px; background: rgba(0,0,0,0.3); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-family: 'Scheherazade New', serif; font-size: 1.6rem; color: var(--primary); }

.nav-base { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 76px; background: var(--glass); backdrop-filter: blur(25px); border-radius: 26px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.08); z-index: 1000; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
.nav-tab { color: var(--text-dim); display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; cursor: pointer; border:none; background:none; font-family:inherit; width: 25%; transition: 0.3s; }
.nav-tab.active { color: var(--primary-light); }
.nav-tab.active .ico { transform: translateY(-30px); color: var(--primary); font-size: 1.8rem; }
.nav-tab .ico { font-size: 1.5rem; transition: 0.3s; }

.overlay-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 20px; }
.modal-win { background: var(--card-bg); border-radius: 34px; padding: 35px; width: 100%; max-width: 440px; border: 1px solid var(--primary-dark); text-align: right; }
.input-field { width: 100%; background: #1a1a2e; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 16px; color: var(--text); font-family: inherit; font-size: 1rem; margin-bottom: 15px; outline: none; text-align: right; }

[lang="ar"] { direction: rtl; }
.hidden { display: none !important; }
.row-fire { font-size: 1.4rem; filter: drop-shadow(0 0 5px var(--fire)); animation: flicker 2s infinite ease-in-out; }
@keyframes flicker { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }
</style>
</head>
<body>

<div id="toast" style="position:fixed; top:40px; left:50%; transform:translateX(-50%) translateY(-100px); background:var(--primary); color:#000; padding:12px 24px; border-radius:30px; z-index:9999; font-weight:700; transition:0.5s;"></div>

<!-- MODALS -->
<div id="m-manual" class="overlay-mask" onclick="closeModal('m-manual')">
    <div class="modal-win" onclick="event.stopPropagation()">
        <div id="manual-step-input">
            <h3 style="color: var(--primary-light); margin-bottom: 20px;">إضافة رصيد يدوي 💎</h3>
            <input type="number" id="manual-val" class="input-field" placeholder="أدخل العدد هنا">
            <button class="btn-royal" onclick="showManualConfirm()">مراجعة الإضافة ✦</button>
        </div>
        <div id="manual-step-confirm" class="hidden" style="text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 15px;">🏁</div>
            <h3 style="color: var(--primary-light); margin-bottom: 10px;">تأكيد الإنجاز</h3>
            <p style="font-size: 1rem; color: var(--text); margin-bottom: 20px;">أنت ستضيف <br><span id="confirm-num-display" style="font-size: 2.22rem; font-family:'Scheherazade New', serif; color:var(--primary);">0</span> <br> استغفار. متأكد؟</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button class="btn-royal" onclick="submitManual()">تأكيد✓</button>
                <button class="btn-royal" style="background:#2a1b1b; color:var(--danger);" onclick="resetManualModal()">تعديل</button>
            </div>
        </div>
    </div>
</div>

<div id="m-edit-user" class="overlay-mask" onclick="closeModal('m-edit-user')">
    <div class="modal-win" onclick="event.stopPropagation()">
        <h3 style="color: var(--primary-light); margin-bottom: 15px;">تعديل البيانات 👤</h3>
        <input type="text" id="edit-u-name" class="input-field" placeholder="الاسم">
        <input type="text" id="edit-u-pass" class="input-field" placeholder="كلمة السر">
        <input type="number" id="edit-u-gems" class="input-field" placeholder="الماس">
        <div id="edit-u-balances" style="margin-top:15px; max-height: 200px; overflow-y: auto;"></div>
        <button class="btn-royal" style="margin-top:20px;" onclick="saveUserEdit()">حفظ التعديلات ✦</button>
    </div>
</div>

<div id="m-custom-goal" class="overlay-mask" onclick="closeModal('m-custom-goal')">
    <div class="modal-win" onclick="event.stopPropagation()">
        <h3 style="color: var(--primary-light); margin-bottom: 15px;">هدف الجلسة 🎯</h3>
        <input type="number" id="custom-goal-val" class="input-field" placeholder="أدخل الرقم المراد">
        <button class="btn-royal" onclick="applyCustomGoal()">حفظ ✦</button>
    </div>
</div>

<!-- SCREENS -->
<div id="s-login" class="screen">
    <div class="container" style="justify-content: center; min-height: 85vh; display: flex; flex-direction: column;">
        <div class="card-master" style="text-align: center;">
            <h1 class="logo-main">مليون استغفار</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;">بوابة الأكابر والذاكرين</p>
            <input type="text" id="login-id" class="input-field" placeholder="اليوزر">
            <input type="password" id="login-pass" class="input-field" placeholder="كلمة السر">
            <button class="btn-royal" onclick="handleLogin()">دخول آمن ✦</button>
        </div>
    </div>
</div>

<div id="s-dash" class="screen">
    <div class="container">
        <div id="dash-header" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px;"></div>
        <div id="dash-chips-area" style="display: flex; overflow-x: auto; gap: 10px; padding-bottom: 15px; scrollbar-width: none;"></div>
        <div id="hero-card-v3-area"></div>
        <div style="display: flex; align-items: center; justify-content: space-between; margin: 10px 0 15px;">
            <h2 style="font-size: 1.1rem; color: var(--primary-light); margin:0;">✦ ترتيب المتنافسين</h2>
            <span class="row-fire">🔥</span>
        </div>
        <div id="rankings-area-ui"></div>
    </div>
</div>

<div id="s-history" class="screen">
    <div class="container">
        <h1 class="logo-main" style="font-size: 2.2rem; margin-bottom: 20px;">سجل الأعمال</h1>
        <div id="history-list-ui"></div>
    </div>
</div>

<div id="s-tasbih" class="screen">
    <div class="container" style="text-align: center;">
        <h2 id="t-chal-title-ui" style="color: var(--primary-light); font-size: 1.35rem;">تحدي المليون</h2>
        
        <div class="goal-picker">
            <button class="goal-btn active" id="g-33" onclick="setG(33)">٣٣</button>
            <button class="goal-btn" id="g-100" onclick="setG(100)">١٠٠</button>
            <button class="goal-btn" id="g-1000" onclick="setG(1000)">١٠٠٠</button>
            <button class="goal-btn" id="g-custom" onclick="openModal('m-custom-goal')">رقم ➕</button>
        </div>

        <div class="bead-ring">
            <svg class="bead-svg" viewBox="0 0 250 250"><circle class="bead-track" cx="125" cy="125" r="120"></circle><circle class="bead-progress" id="bead-progress-bar" cx="125" cy="125" r="120"></circle></svg>
            <button class="bead-core" onclick="tapSubha()">
                <div style="font-size: 0.9rem; margin-bottom: -5px; opacity: 0.8; font-weight: 700;">أستغفر الله</div>
                <div class="bead-lbl" id="sess-v-ui">٠</div>
                <span class="bead-pct-label" id="bead-pct">٠٪</span>
            </button>
        </div>

        <div style="margin: 10px 0 20px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <div style="font-size: 0.9rem; color: var(--text-muted); font-weight: 700;">
                المستهدف للجلسة: <span id="tg-v-ui" style="color: var(--primary-light); font-size: 1.1rem; font-family:'Scheherazade New', serif;">٠</span>
            </div>
            <button class="btn-royal" style="background:transparent; border:1px solid rgba(196, 58, 58, 0.4); color:var(--danger); box-shadow:none; padding: 6px 20px; width: fit-content; border-radius: 12px; font-size: 0.85rem;" onclick="resetSess()">تصفير العداد ↺</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
            <button class="btn-royal" onclick="saveW()">✓ حفظ العمل</button>
            <button class="btn-royal" style="background:#1a1a2e; color:var(--text-muted);" onclick="openManualModal()">➕ رصيد يدوي</button>
        </div>
    </div>
</div>

<div id="s-admin" class="screen">
    <div class="container">
        <h1 class="logo-main" style="font-size: 2rem;">لوحة المدير</h1>
        
        <div class="card-master">
            <h3 style="color:var(--primary-light); margin-bottom:12px;">بدء تحدي جديد 🏆</h3>
            <input type="text" id="nc-title" class="input-field" placeholder="عنوان التحدي">
            <input type="number" id="nc-goal" class="input-field" placeholder="الهدف الرقمي (مثلاً 1000000)">
            <p style="font-size: 0.8rem; margin-bottom: 8px; color: var(--text-muted);">اختار المشاركين:</p>
            <div id="admin-user-checkboxes" style="max-height: 120px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 10px; margin-bottom: 15px;"></div>
            <button class="btn-royal" onclick="addChallenge()">ابدأ التحدي 🔥</button>
        </div>

        <div class="card-master">
            <h3 style="color:var(--accent); margin-bottom:12px;">مستخدم جديد 👤</h3>
            <input type="text" id="nu-name" class="input-field" placeholder="الاسم">
            <input type="text" id="nu-user" class="input-field" placeholder="اليوزر">
            <input type="text" id="nu-pass" class="input-field" placeholder="كلمة السر">
            <button class="btn-royal" style="background:var(--accent); color:#000;" onclick="addUser()">إضافة ✦</button>
        </div>

        <h2 style="font-size: 1.1rem; color: var(--primary-light); margin-bottom:10px;">✦ الأعضاء والسلوكيات</h2>
        <div id="admin-user-list-ui" class="ranking-list"></div>
        <button class="btn-royal" style="margin-top:20px; background:none; color:var(--text-muted);" onclick="navTo('s-dash')">خروج</button>
    </div>
</div>

<div id="s-settings" class="screen">
    <div class="container">
        <h1 class="logo-main">حسابي</h1>
        <div id="profile-area-ui" class="card-master" style="text-align:center;"></div>
        <button class="btn-royal" style="background:var(--danger);" onclick="logout()">تسجيل الخروج</button>
    </div>
</div>

<nav id="app-nav" class="nav-base" style="display:none;">
    <button class="nav-tab active" id="n-dash" onclick="navTo('s-dash')"><span class="ico">🏆</span><span>ترتيب</span></button>
    <button class="nav-tab" id="n-tasbih" onclick="navTo('s-tasbih')"><span class="ico">📿</span><span>سبحة</span></button>
    <button class="nav-tab" id="n-history" onclick="navTo('s-history')"><span class="ico">📜</span><span>سجل</span></button>
    <button class="nav-tab" id="n-settings" onclick="navTo('s-settings')"><span class="ico">👤</span><span>حسابي</span></button>
</nav>

<script>
let state = {
    users: [
        { id: 'u1', name: 'المهندس مصطفى', email: 'mustafa', pass: '1234', isAdmin: true, gems: 25 },
        { id: 'u2', name: 'أحمد علي', email: 'ahmed', pass: '000', isAdmin: false, gems: 12 },
        { id: 'u3', name: 'فاطمة الزهراء', email: 'fatima', pass: '000', isAdmin: false, gems: 18 }
    ],
    challenges: [
        { id: 'c1', title: 'تحدي المليون الأكبر', goal: 1000000, participants: ['u1', 'u2', 'u3'], isActive: true }
    ],
    progress: { 'u1_c1': 520100, 'u2_c1': 320000, 'u3_c1': 450000 },
    logs: [],
    currentUser: null, currentChallengeId: 'c1', subGoal: 33
};

function save() { localStorage.setItem('million_v18', JSON.stringify(state)); }
function load() {
    const d = localStorage.getItem('million_v18') || localStorage.getItem('million_v17');
    if (d) state = Object.assign(state, JSON.parse(d));
    const s = sessionStorage.getItem('_sess');
    if (s) { state.currentUser = state.users.find(u => u.id === s); if (state.currentUser) go('s-dash'); } 
    else go('s-login');
}

function handleLogin() {
    const id = document.getElementById('login-id').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    const u = state.users.find(x => (x.email === id || x.name === id) && x.pass === p);
    if (u) { state.currentUser = u; sessionStorage.setItem('_sess', u.id); go('s-dash'); }
    else toast('يرجى التأكد من البيانات');
}
function logout() { sessionStorage.clear(); location.reload(); }

function go(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    
    const nav = document.getElementById('app-nav');
    if (id === 's-login') { nav.style.display = 'none'; } 
    else { 
        nav.style.display = 'flex'; 
        document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
        const tab = document.getElementById('n-' + id.replace('s-',''));
        if(tab) tab.classList.add('active');
    }
    if (id === 's-dash') syncDash();
    if (id === 's-tasbih') syncTasbih();
    if (id === 's-history') syncHistory();
    if (id === 's-settings') syncProfile();
    syncAdmin();
}
function navTo(id) { go(id); }

/* ─── DASHBOARD ─── */
function syncDash() {
    const h = document.getElementById('dash-header'); if(!h) return;
    h.innerHTML = `
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="width:48px; height:48px; background:var(--primary-dark); border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid var(--primary); font-weight:700;">${state.currentUser.name.slice(0,1)}</div>
            <div>
                <div style="font-weight:700;">${state.currentUser.name}</div>
                ${state.currentUser.isAdmin ? `<button onclick="navTo('s-admin')" style="color:var(--primary); font-size:0.6rem; background:none; border:none; border-bottom:1px solid;">لوحة الإدارة</button>` : ''}
            </div>
        </div>
        <div class="pouch-gem">💎 ${ar(state.currentUser.gems || 0)}</div>
    `;
    const cur = state.challenges.find(x => x.id === state.currentChallengeId);
    if(cur) {
        const val = state.progress[`${state.currentUser.id}_${cur.id}`] || 0;
        const pct = Math.min(100, (val / cur.goal * 100)).toFixed(1);
        const rem = Math.max(0, cur.goal - val);
        document.getElementById('hero-card-v3-area').innerHTML = `
            <div class="hero-card-v3">
                <div class="hero-svg-box">
                    <svg class="hero-svg" viewBox="0 0 100 100"><circle class="hero-track" cx="50" cy="50" r="40"></circle><circle class="hero-progress" cx="50" cy="50" r="40" style="stroke-dashoffset: ${238 - (238 * pct / 100)};"></circle></svg>
                    <div class="hero-pct-text">${ar(Math.floor(pct))}%</div>
                </div>
                <div style="flex:1;">
                    <div style="font-weight:700; color:var(--primary-light); margin-bottom:5px;">${cur.title}</div>
                    <div class="hero-stat-row"><span class="hero-stat-lbl">إنجاز ✅</span><span class="hero-stat-val">${fmt(val)}</span></div>
                    <div class="hero-stat-row"><span class="hero-stat-lbl">متبقي ✨</span><span class="hero-stat-val" style="color:var(--text);">${fmt(rem)}</span></div>
                </div>
            </div>
        `;
        renderRanks(cur);
    }
}
function renderRanks(chal) {
    const list = state.users.filter(u => chal.participants.includes(u.id)).map(u => ({ ...u, score: state.progress[`${u.id}_${chal.id}`] || 0 })).sort((a,b) => b.score - a.score);
    const maxScore = list[0].score;
    document.getElementById('rankings-area-ui').innerHTML = list.map((u, i) => {
        const isMe = u.id === state.currentUser.id; const isFirst = i === 0; const gap = maxScore - u.score;
        return `<div class="ranking-row ${isMe ? 'me' : ''}"><div class="rank-badge">${isFirst?'🔥':ar(i+1)}</div><div style="flex:1;"><div style="font-weight:700;">${u.name}</div><div style="font-size:0.6rem; color:${isFirst?'var(--accent)':'var(--danger)'};">${isFirst?'المتصدر':'باقٍ لك '+fmt(gap)}</div></div><div style="text-align:left;"><div style="font-family:'Scheherazade New'; font-size:1.5rem; color:var(--primary-light);">${fmt(u.score)}</div></div></div>`;
    }).join('');
}

/* ─── HISTORY (LOGS) ─── */
function syncHistory(adminUserId = null) {
    const targetId = adminUserId || state.currentUser.id;
    const history = state.logs.filter(l => l.userId === targetId).reverse();
    const area = document.getElementById('history-list-ui'); if(!area) return;
    area.innerHTML = history.length ? history.map(l => `
        <div class="log-row ${l.type==='manual'?'manual':''}">
            <div class="log-info">
                <div class="log-type">${l.type==='manual'?'💎 رصيد يدوي':'📿 جلسة سبحة'}</div>
                <div class="log-date">${l.date}</div>
            </div>
            <div class="log-amt">${fmt(l.amount)}</div>
        </div>
    `).join('') : '<p style="text-align:center; opacity:0.6;">لا توجد عمليات مسجلة بعد.</p>';
}

/* ─── TASBIH & SAVE ─── */
let sessCount = 0;
function syncTasbih() {
    const c = state.challenges.find(x => x.id === state.currentChallengeId);
    document.getElementById('t-chal-title-ui').textContent = c?c.title:'تحدي المليون';
    document.getElementById('sess-v-ui').innerText = ar(sessCount);
    document.getElementById('tg-v-ui').innerText = ar(state.subGoal);
    const pct = sessCount === 0 ? 0 : ((sessCount % state.subGoal === 0) ? 100 : ((sessCount % state.subGoal) / state.subGoal * 100));
    document.getElementById('bead-progress-bar').style.strokeDashoffset = 754 - (754 * pct / 100);
    document.getElementById('bead-pct').innerText = ar(Math.floor(pct)) + '٪';
    document.querySelectorAll('.goal-btn').forEach(b => b.classList.toggle('active', b.id==='g-'+state.subGoal || (b.id==='g-custom' && ![33,100,1000].includes(state.subGoal))));
}
function setG(v) { sessCount = 0; state.subGoal = v; save(); syncTasbih(); }
function tapSubha() { sessCount++; syncTasbih(); if(sessCount % state.subGoal === 0) { if('vibrate' in navigator) navigator.vibrate([100, 50, 100]); toast('تم الوصول للورد! ✨'); } else if('vibrate' in navigator) navigator.vibrate(40); }
function resetSess() { if(sessCount > 0 && confirm('هل تريد تصفير العداد الحالي؟ لن يتم حفظه.')) { sessCount = 0; syncTasbih(); toast('تم التصفير ↺'); } else if(sessCount > 0 === false) { sessCount = 0; syncTasbih(); } }
function saveW() {
    if(sessCount <= 0) return;
    const k = state.currentUser.id+'_'+state.currentChallengeId;
    const ch = state.challenges.find(c => c.id === state.currentChallengeId);
    addLog(state.currentUser.id, state.currentChallengeId, 'subha', sessCount);
    const old = state.progress[k]||0; state.progress[k] = old + sessCount;
    const nG = Math.floor(state.progress[k]/500) - Math.floor(old/500);
    if(nG>0) { state.currentUser.gems = (state.currentUser.gems||0)+nG; }
    save(); sessCount=0; syncTasbih(); syncDash(); toast('تم حفظ العمل ✓');
}

/* ─── MODALS ─── */
function openManualModal() { resetManualModal(); openModal('m-manual'); }
function resetManualModal() { document.getElementById('manual-step-input').classList.remove('hidden'); document.getElementById('manual-step-confirm').classList.add('hidden'); document.getElementById('manual-val').value = ''; }
function showManualConfirm() { const v = parseInt(document.getElementById('manual-val').value); if(!v||v<0) return; document.getElementById('confirm-num-display').innerText = fmt(v); document.getElementById('manual-step-input').classList.add('hidden'); document.getElementById('manual-step-confirm').classList.remove('hidden'); }
function submitManual() { 
    const v = parseInt(document.getElementById('manual-val').value); 
    const k = state.currentUser.id+'_'+state.currentChallengeId;
    addLog(state.currentUser.id, state.currentChallengeId, 'manual', v);
    state.progress[k] = (state.progress[k]||0)+v; 
    save(); closeModal('m-manual'); syncDash(); syncTasbih(); toast('تمت الإضافة ✓');
}

/* ─── ADMIN ─── */
function syncAdmin() {
    const cb = document.getElementById('admin-user-checkboxes'); if(!cb) return;
    cb.innerHTML = state.users.map(u => `<label style="display:flex; align-items:center; gap:8px; margin-bottom:5px;"><input type="checkbox" value="${u.id}" class="nu-p" ${u.isAdmin?'checked disabled':''}> ${u.name}</label>`).join('');
    
    document.getElementById('admin-user-list-ui').innerHTML = state.users.map((u, i) => `
        <div class="ranking-row">
            <div style="flex:1;">
                <strong>${u.name}</strong>
                <div style="font-size:0.6rem; color:var(--text-muted);">رصيد إجمالي: ${fmt(getTotal(u.id))}</div>
            </div>
            <button onclick="viewUserBehavior('${u.id}')" style="background:none; border:none; color:var(--primary); font-size:0.7rem; border-bottom:1px solid;">السلوك 🔍</button>
            <button onclick="openEditUser(${i})" style="color:var(--text-dim); background:none; border:none; margin-right:8px; font-size:0.7rem;">تعديل✏️</button>
        </div>
    `).join('');
}
function getTotal(uid) { let t=0; state.challenges.forEach(c => { if(c.participants.includes(uid)) t+=(state.progress[uid+'_'+c.id]||0); }); return t; }
function viewUserBehavior(uid) { navTo('s-history'); syncHistory(uid); }

function addUser() {
    const n = document.getElementById('nu-name').value, e = document.getElementById('nu-user').value, p = document.getElementById('nu-pass').value;
    if(!n||!e||!p) return alert('أكمل الخانات');
    state.users.push({ id:'u'+Date.now(), name:n, email:e, pass:p, isAdmin:false, gems:0 });
    save(); syncAdmin(); toast('العضو جاهز ✨');
}
function addChallenge() {
    const t = document.getElementById('nc-title').value, g = parseInt(document.getElementById('nc-goal').value);
    const p = Array.from(document.querySelectorAll('.nu-p:checked')).map(x => x.value);
    if(!t||!g||p.length===0) return alert('بيانات ناقصة');
    state.challenges.push({ id:'c'+Date.now(), title:t, goal:g, participants:p, isActive:true });
    save(); syncAdmin(); toast('تم بدء التحدي 🏆');
}

/* ─── UTILS ─── */
function addLog(uid, cid, type, amt) {
    const now = new Date();
    const d = now.toLocaleDateString('ar-EG') + ' ' + now.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
    state.logs.push({ userId: uid, challengeId: cid, type: type, amount: amt, date: d });
}
function ar(n) { return n.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]); }
function fmt(n) { return ar((n || 0).toLocaleString('en-US')); }
function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.transform = 'translateX(-50%) translateY(0)'; setTimeout(() => t.style.transform = 'translateX(-50%) translateY(-100px)', 3000); }
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function applyCustomGoal() { const v = parseInt(document.getElementById('custom-goal-val').value); if(!v||v<1) return; setG(v); closeModal('m-custom-goal'); }
function syncProfile() { const u = state.currentUser; document.getElementById('profile-area-ui').innerHTML = `<div style="width:70px; height:70px; margin:0 auto 15px; background:var(--primary-dark); border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid var(--primary); font-size:1.5rem;">${u.name.slice(0,1)}</div><h2 style="color:var(--primary-light);">${u.name}</h2><div class="pouch-gem" style="width:fit-content; margin:15px auto;">💎 الماس: ${ar(u.gems || 0)}</div>`; }

document.addEventListener('keydown', e => { if((e.code==='Space'||e.code==='Enter') && document.getElementById('s-tasbih').classList.contains('active')){ e.preventDefault(); tapSubha(); } });
load();
</script>
</body>
